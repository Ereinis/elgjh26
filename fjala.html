<style>
    *{margin:0;padding:0;box-sizing:border-box}
body {
  font-family: Inter, sans-serif;
  color: #f5d9a6;

  background:
    linear-gradient(rgba(91, 76, 49, 0.578), rgba(91, 76, 49, 0.578)),
    url("WhatsApp\ Image\ 2026-04-01\ at\ 10.47.41\ PM.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  min-height: 100vh;
}

header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:24px 64px;
    border-bottom:1px solid rgba(255,215,150,.2)

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-family:Cinzel,serif;
    font-size:22px;
    font-weight:700

nav{
    display:flex;
    gap:32px;
    font-size:15px
}
nav a{
    text-decoration:none;
    color:#e8c98b;
    opacity:.85
}
nav a:hover{opacity:1}
.hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    padding:50px 24px
}
.hero h1{
    font-family:Cinzel,serif;
    font-size:64px;
    font-weight:700;
    margin-bottom:24px
}
.hero p{
    font-size:100px;
    max-width:800px;
    margin-bottom:40px;
    opacity:.9
}
.hero button{
    background:linear-gradient(135deg,rgb(#dcbd60),rgb(#dcbd60));
    border:none;
    border-radius:12px;
    padding:14px 36px;
    font-size:20px;
    font-weight:500;
    color:#000000;
    cursor:pointer
}
.hero button:hover{opacity:.9}
.container {
  max-width: 800px;     /* kontrollon gjerësinë */
  margin: 0 auto;       /* e vendos në qendër */
}

.container p {
  text-align: left;     /* tekst majtas */
  line-height: 1.7;
  font-size: 17px;
  margin-bottom: 24px;
}

.quote-box {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 215, 150, 0.3);
  border-radius: 20px;
  padding: 30px 40px;
  max-width: 700px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.quote-box p {
  font-size: 26px;
  font-style: italic;
  line-height: 1.6;
  text-align: center;
}
#countdown {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0.8;
}
@media (max-width: 768px) {

  header{
    padding:18px 20px;
  }

  nav{
    gap: 16px;
    font-size: 14px;
  }

  .hero h1{
    font-size: 44px;
  }

  .hero p{
    font-size: 18px;
    max-width: 100%;
  }

  .hero button{
    padding: 12px 26px;
    font-size: 18px;
  }
}

@media (max-width: 480px) {

  header{
    flex-direction:column;
    gap: 12px;
    align-items:flex-start;
  }

  nav{
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo{
    font-size: 20px;
  }

  .hero{
    padding: 40px 16px;
  }

  .hero h1{
    font-size: 36px;
  }

  .hero p{
    font-size: 16px;

  }

  .hero button{
    width: 100%;
    max-width: 260px;

<body>
<header>

<nav>

<section class="hero">
    <h1>Fjala e ditës</h1>
    <div class="quote-box">
        <p id="daily-quote"></p>
    </div>
    <div id="countdown"></div>
</section>
 <script>
const quotes = [
  "Ti je më i fortë se çdo dyshim që të kalon në mendje.",
  "Mos harro: edhe ditët e vështira kalojnë. Ti mbetesh.",
  "Drita jote nuk shuhet, edhe kur ti mendon se është errësirë.",
  "Ti nuk je rastësi… je mundësi.",
  "Çdo hap i vogël të çon më afër ëndrrës.",
  "Beso te vetja, sepse aty fillon çdo mrekulli.",
  "Mos u dorëzo – historia jote ende po shkruhet.",
  "Ti ke gjithçka brenda vetes për të arritur atë që do.",
  "Mos e nënvlerëso fuqinë që ke – ajo të ka mbajtur deri këtu.",
  "Fjalët që i thua vetes bëhen zëri i shpirtit tënd… zgjidh t’i flasësh me dashuri.",
  "Ti je drita që kërkon – mos e kërko jashtë vetes.",
  "Edhe kur askush nuk e sheh, ti po lufton dhe kjo ka vlerë.",
  "Shpirti yt e di rrugën… thjesht mos e mbulo me frikë.",
  "Suksesi fillon nga besimi në vetvete.",
  "Edhe hapat e vegjël të çojnë larg.",
  "Ti je më i fortë se sa mendon, dhe më i aftë se sa e imagjinon.",
  "Forca jote fillon aty ku mendon se mbaron.",
  "Mos e nënvlerëso veten — ke kaluar më shumë se sa mendon.",
  "Brenda teje ka më shumë forcë se çdo pengesë që ke përballë.",
  "Ti nuk je i dobët, thjesht nuk e ke zbuluar ende gjithë forcën tënde.",
  "Ti je më i fortë se çdo ditë e vështirë që ke kaluar.",
  "Forca jote nuk duket gjithmonë, por është gjithmonë aty.",
  "Ndonjëherë thjesht fakti që vazhdon është një fitore.",
  "Ti nuk dorëzohesh lehtë — dhe kjo të bën të veçantë.",
  "Çdo betejë që ke fituar të ka bërë më të fortë.",
  "Mos ki frikë nga vështirësitë, ato të formojnë.",
  "Ti ke brenda vetes gjithçka që të duhet për të ecur përpara.",
  "Forca nuk është të mos rrëzohesh, por të ngrihesh çdo herë.",
  "Një zemër e fortë nuk dorëzohet, edhe kur është e lodhur.",
  "Një fjalë e thënë me zemër mund të shërojë plagë që askush nuk i sheh.",
  "Ndonjëherë njerëzit harrojnë çfarë u bëre, por kurrë si i bëre të ndihen me fjalët e tua.",
  "Fjalët janë si gjurmë në shpirt: disa të ngrohin, disa të lëndojnë përgjithmonë.",
  "Një shpirt i lënduar nuk ka nevojë për shumë… vetëm për një fjalë të butë.",
  "Fjalët e mira janë dritë në errësirën e dikujt.",
  "Një fjali mund të ndryshojë një ditë… ose një jetë të tërë.",
  "Fjalët kanë peshë — edhe kur thuhen pa menduar, bien rëndë në zemër.",
  "Shpirti i njeriut ushqehet me fjalë të mira dhe plagoset nga ato të këqija.",
  "Thuaj fjalë që do doje t’i dëgjoje vetë në ditët e tua më të vështira"
];

// Merr datën e sotme nga klienti
const today = new Date();

// Krijon një numër unik për çdo ditë
const index = today.getFullYear() * 365 + today.getMonth() * 31 + today.getDate();

// Zgjedh një fjali bazuar në ditën
const quote = quotes[index % quotes.length];

// Vendos tekstin në HTML
document.getElementById("daily-quote").textContent = quote;


function updateCountdown() {
  const now = new Date();

  // Krijon daten e nesërme në 00:00
  const tomorrow = new Date();
  tomorrow.setHours(24, 0, 0, 0);

  // Diferenca në milisekonda
  const diff = tomorrow - now;

  // Konverto në orë, minuta, sekonda
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  // Shfaq timer-in
  document.getElementById("countdown").textContent =
    `Fjala e re në: ${hours}h ${minutes}m ${seconds}s`;

  // Rifresko çdo sekondë
  setTimeout(updateCountdown, 1000);

  if (diff <= 1000) {
      location.reload();
    }
}

// Start
updateCountdown();
</script>
</body>
