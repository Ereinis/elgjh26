<style>

.container {
  max-width: 800px;     /* kontrollon gjerësinë */

.quote-box p {

<nav>

<section class="hero">
    <h1>Fjala e ditës</h1>
    <div class="quote-box">
        <p id="daily-quote"></p>
    </div>
    <div id="countdown"></div>
</section>
 <script>
const quotes = [
  "Fjala ka peshë më të rëndë se heshtja.",
  "Një fjalë e mirë hap zemra.",
  "Fjala e thënë në kohë është ar.",
  "Mendohu para se të flasësh.",
  "Fjalët ndërtojnë ose shkatërrojnë.",
  "Një fjali mund të ndryshojë një jetë.",
  "Heshtja shpesh flet më shumë se fjalët.",
  "Fjala është pasqyrë e shpirtit.",
  "Mos e nënvlerëso fuqinë e një fjale.",
  "Fjalët janë fara e mendimit."
];

// Merr datën e sotme nga klienti
const today = new Date();

// Krijon një numër unik për çdo ditë
const index = today.getFullYear() * 365 + today.getMonth() * 31 + today.getDate();

// Zgjedh një fjali bazuar në ditën
const quote = quotes[index % quotes.length];

// Vendos tekstin në HTML
document.getElementById("daily-quote").textContent = quote;


function updateCountdown() {
  const now = new Date();

  // Krijon daten e nesërme në 00:00
  const tomorrow = new Date();
  tomorrow.setHours(24, 0, 0, 0);

  // Diferenca në milisekonda
  const diff = tomorrow - now;

  // Konverto në orë, minuta, sekonda
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  // Shfaq timer-in
  document.getElementById("countdown").textContent =
    `Fjala e re në: ${hours}h ${minutes}m ${seconds}s`;

  // Rifresko çdo sekondë
  setTimeout(updateCountdown, 1000);

  if (diff <= 1000) {
      location.reload();
    }
}

// Start
updateCountdown();
</script>
</body>
